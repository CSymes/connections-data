name: Update Connections JSONL

on:
  workflow_dispatch:
  schedule:
    - cron: "15 11 * * *" # 21:15 AEST / 20:15 AEDT

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore raw JSON cache
        uses: actions/cache/restore@v4
        with:
          path: .raw_json
          key: raw-json-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            raw-json-${{ github.ref_name }}-

      - name: Ensure raw JSON directory exists
        run: mkdir -p .raw_json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run pipeline
        run: python main.py

      - name: Save raw JSON cache
        uses: actions/cache/save@v4
        with:
          path: .raw_json
          key: raw-json-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Commit and push JSONL changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.jsonl
          if git diff --cached --quiet; then
            echo "No JSONL changes to commit"
            exit 0
          fi
          git commit -m "chore: update jsonl data"
          git push
